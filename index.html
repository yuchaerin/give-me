<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안녕..?</title>

  <!-- Open Graph -->
  <meta property="og:title" content="중요한 질문이 있어.." />
  <meta property="og:description" content="신중하게 대답해줘 😏" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://give-me-six.vercel.app" />
  <meta property="og:image" content="https://give-me-six.vercel.app/preview.jpg" />

  <!-- Twitter / Discord / Slack -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="중요한 질문이 있어.." />
  <meta name="twitter:description" content="신중하게 대답해줘 😏" />
  <meta name="twitter:image" content="https://give-me-six.vercel.app/preview.jpg" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --pink-1: #ffd8e8;
      --pink-2: #ffb7d1;
      --pink-3: #ff8fbc;
      --pink-4: #ff6fa8;
      --text: #4b3b44;
      --white: rgba(255, 255, 255, 0.72);
      --shadow: 0 20px 50px rgba(255, 111, 168, 0.18);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #fff7fb 0%, transparent 25%),
        radial-gradient(circle at 80% 10%, #ffe3f0 0%, transparent 25%),
        radial-gradient(circle at 80% 80%, #ffeef7 0%, transparent 20%),
        linear-gradient(135deg, #fff8fc 0%, #ffe6f1 45%, #ffd7ea 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .bg-deco {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      font-size: 24px;
      opacity: 0.8;
      animation: twinkle 3s ease-in-out infinite;
    }

    .sparkle:nth-child(1) {
      top: 8%;
      left: 10%;
      animation-delay: 0s;
    }

    .sparkle:nth-child(2) {
      top: 18%;
      right: 14%;
      animation-delay: 1s;
    }

    .sparkle:nth-child(3) {
      bottom: 15%;
      left: 12%;
      animation-delay: 2s;
    }

    .sparkle:nth-child(4) {
      bottom: 10%;
      right: 10%;
      animation-delay: 1.4s;
    }

    @keyframes twinkle {

      0%,
      100% {
        transform: scale(0.85) rotate(0deg);
        opacity: 0.45;
      }

      50% {
        transform: scale(1.15) rotate(12deg);
        opacity: 1;
      }
    }

    .container {
      position: relative;
      width: min(92vw, 720px);
      min-height: 620px;
      padding: 28px;
      z-index: 2;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 620px;
      background: var(--white);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 36px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 28px 22px 30px;
    }

    .top-stickers {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #7f6672;
      font-size: 14px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 8px 22px rgba(255, 143, 188, 0.12);
    }

    .badge {
      position: absolute;
      top: 72px;
      right: 26px;
      background: linear-gradient(135deg, #ff92bf, #ff72a8);
      color: white;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(255, 111, 168, 0.25);
      transform: rotate(8deg);
    }

    #mainScreen,
    #result,
    #sadResult {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .question-wrap {
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .mini-caption {
      font-size: 15px;
      color: #9b7d89;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .question-bubble {
      position: relative;
      display: inline-block;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 244, 249, 0.96));
      color: var(--text);
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 900;
      line-height: 1.35;
      padding: 26px 26px;
      border-radius: 30px;
      box-shadow: 0 14px 36px rgba(255, 143, 188, 0.16);
      max-width: 88%;
      word-break: keep-all;
    }

    .question-bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -14px;
      transform: translateX(-50%) rotate(45deg);
      width: 26px;
      height: 26px;
      background: rgba(255, 247, 251, 0.98);
      border-radius: 6px;
    }

    .sub-line {
      margin-top: 16px;
      font-size: 16px;
      color: #9d7c8e;
      font-weight: 700;
    }

    .buttons {
      position: relative;
      margin-top: 74px;
      width: 100%;
      height: 280px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 900;
      padding: 16px 34px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 12px 24px rgba(255, 143, 188, 0.18);
      -webkit-tap-highlight-color: transparent;
      transform-origin: center center;
    }

    button:hover {
      transform: translateY(-2px) scale(1.04);
    }

    #yesBtn {
      position: relative;
      z-index: 2;
      background: linear-gradient(135deg, #ff93bf, #ff6fa8);
      color: white;
      min-width: 120px;
    }

    #yesBtn::after {
      content: "💖";
      margin-left: 8px;
    }

    #noBtn {
      position: absolute;
      left: 58%;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      color: #7a6570;
      min-width: 120px;
      border: 2px solid rgba(255, 183, 209, 0.75);
      z-index: 3;
    }

    .hint {
      margin-top: 8px;
      font-size: 13px;
      color: #b18d9d;
      font-weight: 700;
    }

    #result,
    #sadResult {
      display: none;
      margin-top: 44px;
      padding: 18px 10px 10px;
    }

    .result-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 900;
      color: #ff6ca7;
      margin-bottom: 14px;
      text-shadow: 0 4px 18px rgba(255, 143, 188, 0.18);
    }

    .result-sub {
      font-size: 15px;
      color: #9f7d8d;
      font-weight: 700;
      margin-bottom: 24px;
    }

    #hamsterImage,
    #sadImage {
      width: min(250px, 72vw);
      height: auto;
      border-radius: 24px;
      display: inline-block;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.12);
      background: #fff;
    }

    #hamsterImage {
      animation: dance 0.42s infinite alternate ease-in-out;
      transform-origin: center bottom;
    }

    #sadImage {
      animation: sadShake 1.5s ease-in-out infinite;
      opacity: 0.96;
    }

    @keyframes dance {
      0% {
        transform: translateY(0) rotate(-7deg) scale(1);
      }

      25% {
        transform: translateY(-9px) rotate(7deg) scale(1.03);
      }

      50% {
        transform: translateY(0) rotate(-6deg) scale(1);
      }

      75% {
        transform: translateY(-12px) rotate(9deg) scale(1.06);
      }

      100% {
        transform: translateY(0) rotate(-4deg) scale(1);
      }
    }

    @keyframes sadShake {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      20% {
        transform: translateY(1px) rotate(-2deg);
      }

      40% {
        transform: translateY(0) rotate(2deg);
      }

      60% {
        transform: translateY(2px) rotate(-1.5deg);
      }

      80% {
        transform: translateY(0) rotate(1deg);
      }
    }

    .heart,
    .tear,
    .confetti {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      font-size: 24px;
      animation: floatUp 2s ease-out forwards;
    }

    .tear {
      font-size: 20px;
      animation: fallDown 1.8s linear forwards;
      opacity: 0.9;
    }

    .confetti {
      font-size: 26px;
      animation: confettiDrop 2s linear forwards;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.8);
      }

      15% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-180px) scale(1.45);
      }
    }

    @keyframes fallDown {
      0% {
        opacity: 0;
        transform: translateY(-4px) scale(0.8);
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(110px) scale(1.1);
      }
    }

    @keyframes confettiDrop {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translateY(105vh) rotate(540deg);
      }
    }

    @keyframes shake {
      0% {
        transform: translate(0px, 0px);
      }

      25% {
        transform: translate(-6px, 4px);
      }

      50% {
        transform: translate(6px, -4px);
      }

      75% {
        transform: translate(-4px, 6px);
      }

      100% {
        transform: translate(0px, 0px);
      }
    }

    .shake {
      animation: shake 0.4s;
    }

    .bottom-caption {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: 13px;
      color: #ab8b99;
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .container {
        width: 94vw;
        min-height: 86vh;
        padding: 14px;
      }

      .card {
        min-height: 86vh;
        border-radius: 28px;
        padding: 20px 14px 28px;
      }

      .badge {
        top: 64px;
        right: 16px;
        font-size: 12px;
        padding: 9px 12px;
      }

      .question-wrap {
        margin-top: 60px;
      }

      .buttons {
        height: 320px;
        margin-top: 66px;
      }

      button {
        font-size: 18px;
        padding: 14px 26px;
      }

      .bottom-caption {
        bottom: 18px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-deco">
    <div class="sparkle">✨</div>
    <div class="sparkle">💖</div>
    <div class="sparkle">✨</div>
    <div class="sparkle">🎀</div>
  </div>

  <div class="container">
    <div class="card">
      <div class="top-stickers">
        <div class="pill">😘🥰😏🤪</div>
        <div class="pill">💌 답변 필수</div>
      </div>

      <div class="badge">PLEASE SAY YES</div>

      <div id="mainScreen">
        <div class="question-wrap">
          <div class="mini-caption">갑작스러운 중요한 질문</div>
          <div class="question-bubble">나한테 밥 사줄래 ..?</div>
          <div class="sub-line">신중하게 생각해도 답은 하나뿐이야</div>
        </div>

        <div class="buttons" id="buttonArea">
          <button id="yesBtn">예</button>
          <button id="noBtn">아니오</button>
        </div>

        <div class="hint">※ 아니오는 시스템상 지원되지 않을 수 있습니다</div>
      </div>

      <div id="result">
        <div class="result-title">역시 그럴 줄 알았어 💖</div>
        <div class="result-sub">야르야르야르~~~</div>
        <img id="hamsterImage" src="./yumham.jpg" alt="기뻐하는 햄스터" />
      </div>

      <div id="sadResult">
        <div class="result-title" style="color:#7b879f;">진짜 너무해... 🥺</div>
        <div class="result-sub">다시 잘 생각해봐...</div>
        <img id="sadImage" src="./ehham.jpg" alt="슬퍼하는 햄스터" />
      </div>

      <div class="bottom-caption">made with excessive emotional pressure ✨</div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const buttonArea = document.getElementById("buttonArea");
    const mainScreen = document.getElementById("mainScreen");
    const result = document.getElementById("result");
    const sadResult = document.getElementById("sadResult");
    const container = document.querySelector(".card");
    const hamsterImage = document.getElementById("hamsterImage");
    const sadImage = document.getElementById("sadImage");

    const noTexts = ["아니오", "진짜?", "잠깐", "다시 생각해봐", "그러지마", "🥺"];
    const hamsterCry = new Audio("./hamster.mp3");

    let escapeLevel = 0;
    let isAnimating = false;
    let heartInterval = null;
    let tearInterval = null;
    let confettiInterval = null;
    let resetTimer = null;
    let yesScale = 1;

    const initialNoBtnLeft = "58%";
    const initialNoBtnTop = "0px";

    function updateNoText() {
      const index = Math.min(escapeLevel, noTexts.length - 1);
      noBtn.textContent = noTexts[index];
    }

    function growYesButton() {
      yesScale = Math.min(2.2, yesScale + 0.08);
      yesBtn.style.transform = `scale(${yesScale})`;
    }

    function moveNoButton() {
      if (isAnimating || result.style.display === "block" || sadResult.style.display === "block") return;
      isAnimating = true;

      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      const randomX = Math.random() * Math.max(maxX, 0);
      const randomY = Math.random() * Math.max(maxY, 0);

      escapeLevel += 1;
      updateNoText();
      growYesButton();

      const duration = Math.max(0.04, 0.22 - escapeLevel * 0.015);

      noBtn.style.transition = `left ${duration}s ease, top ${duration}s ease`;
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;

      setTimeout(() => {
        isAnimating = false;
      }, duration * 1000);
    }

    function isPointerNearButton(x, y) {
      const rect = noBtn.getBoundingClientRect();
      const buffer = 55;

      return (
        x >= rect.left - buffer &&
        x <= rect.right + buffer &&
        y >= rect.top - buffer &&
        y <= rect.bottom + buffer
      );
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = Math.random() > 0.5 ? "💖" : "💕";

      const rect = hamsterImage.getBoundingClientRect();
      const baseRect = container.getBoundingClientRect();

      const x = rect.left - baseRect.left + rect.width / 2 + (Math.random() * 120 - 60);
      const y = rect.top - baseRect.top + rect.height / 2 + (Math.random() * 40 - 10);

      heart.style.left = `${x}px`;
      heart.style.top = `${y}px`;

      container.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 2000);
    }

    function createTear() {
      const tear = document.createElement("div");
      tear.className = "tear";
      tear.textContent = Math.random() > 0.5 ? "💧" : "😭";

      const rect = sadImage.getBoundingClientRect();
      const baseRect = container.getBoundingClientRect();

      const x = rect.left - baseRect.left + rect.width / 2 + (Math.random() * 90 - 45);
      const y = rect.top - baseRect.top + rect.height / 3;

      tear.style.left = `${x}px`;
      tear.style.top = `${y}px`;

      container.appendChild(tear);

      setTimeout(() => {
        tear.remove();
      }, 1800);
    }

    function createConfetti() {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      const symbols = ["🎉", "✨", "💖", "🎊"];
      confetti.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      confetti.style.left = `${Math.random() * window.innerWidth}px`;
      confetti.style.top = "-20px";

      document.body.appendChild(confetti);

      setTimeout(() => {
        confetti.remove();
      }, 2000);
    }

    function clearEffects() {
      document.querySelectorAll(".heart, .tear, .confetti").forEach((el) => el.remove());
      clearInterval(heartInterval);
      clearInterval(tearInterval);
      clearInterval(confettiInterval);
      clearTimeout(resetTimer);
      heartInterval = null;
      tearInterval = null;
      confettiInterval = null;
      resetTimer = null;
    }

    function resetToMainScreen() {
      clearEffects();

      result.style.display = "none";
      sadResult.style.display = "none";
      mainScreen.style.display = "block";

      escapeLevel = 0;
      isAnimating = false;
      yesScale = 1;

      noBtn.textContent = "아니오";
      yesBtn.style.transform = "scale(1)";
      noBtn.style.transition = "left 0.18s ease, top 0.18s ease";
      noBtn.style.left = initialNoBtnLeft;
      noBtn.style.top = initialNoBtnTop;
    }

    function mobileNoReaction() {
      document.body.classList.add("shake");

      hamsterCry.currentTime = 0;
      hamsterCry.play().catch(() => { });

      setTimeout(() => {
        document.body.classList.remove("shake");
      }, 400);
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("mouseover", moveNoButton);

    document.addEventListener("mousemove", (e) => {
      if (isPointerNearButton(e.clientX, e.clientY)) {
        moveNoButton();
      }
    });

    document.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      if (!touch) return;

      if (isPointerNearButton(touch.clientX, touch.clientY)) {
        e.preventDefault();
        mobileNoReaction();
        moveNoButton();
      }
    }, { passive: false });

    document.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      if (!touch) return;

      if (isPointerNearButton(touch.clientX, touch.clientY)) {
        e.preventDefault();
        moveNoButton();
      }
    }, { passive: false });

    yesBtn.addEventListener("click", () => {
      clearEffects();

      mainScreen.style.display = "none";
      sadResult.style.display = "none";
      result.style.display = "block";

      heartInterval = setInterval(createHeart, 220);
      confettiInterval = setInterval(createConfetti, 150);

      resetTimer = setTimeout(resetToMainScreen, 5000);
    });

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();

      clearEffects();
      mainScreen.style.display = "none";
      result.style.display = "none";
      sadResult.style.display = "block";

      tearInterval = setInterval(createTear, 260);
      resetTimer = setTimeout(resetToMainScreen, 2500);
    });

    noBtn.addEventListener("touchend", (e) => {
      e.preventDefault();
      mobileNoReaction();
      moveNoButton();
    }, { passive: false });
  </script>
</body>

</html>
